  server {
      listen 80;
      server_name localhost;

      # ===== 前端静态资源 =====
      location / {
          proxy_pass http://demo-frontend:80;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
      }

      # ===== Client 微服务接口 =====
      location /api/client/ {
          proxy_pass http://demo-backend-client:8081;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      # ===== 主服务接口反向代理 =====
      location /api/ {
          proxy_pass http://demo-backend-main:8080;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
      }

      # ===== 健康检查接口 =====
      location /health {
          proxy_pass http://demo-backend-main:8080;
          proxy_set_header Host $host;
          proxy_set_header X-Real-IP $remote_addr;
      }
  }